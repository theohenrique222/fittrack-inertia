services:

  fittrack:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
        WWWUSER: '${WWWUSER:-1000}'
    container_name: fittrack-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - fittrack-storage:/var/www/html/storage
      - fittrack-bootstrap:/var/www/html/bootstrap/cache
      - node-modules:/var/www/html/node_modules
    networks:
      - fittrack-network
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: '${DB_DATABASE:-fittrack}'
      DB_USERNAME: root
      DB_PASSWORD: '${DB_PASSWORD:-secret}'
    ports:
      - '${VITE_PORT:-5173}:5173'

  nginx:
    image: nginx:alpine
    container_name: fittrack-nginx
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8088}:80'
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - fittrack-network
    depends_on:
      - fittrack

  mysql:
    image: mysql:8.0
    container_name: fittrack-mysql
    restart: unless-stopped
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
      MYSQL_DATABASE: '${DB_DATABASE:-fittrack}'
    volumes:
      - fittrack-mysql-data:/var/lib/mysql
    networks:
      - fittrack-network
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-secret}']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  fittrack-network:
    driver: bridge

volumes:
  fittrack-mysql-data:
    driver: local
  fittrack-storage:
    driver: local
  fittrack-bootstrap:
    driver: local
  node-modules:
    driver: local
